name: Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A5818C: ${{ secrets.A5818C }}
          BF60C0: ${{ secrets.BF60C0 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('A5818C', '')
          tag_b = os.environ.get('BF60C0', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- 63a5f335e142e0251a850d805539 -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- 3b61543c82c9602f26af0bc46bdef216d60faba4d85ee5 -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
